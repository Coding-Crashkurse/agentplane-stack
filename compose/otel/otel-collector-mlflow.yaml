# OTel collector -> MLflow OTLP ingestion (profile "mlflow").
# MLflow >= 3.6 accepts OTLP/HTTP traces at <server>/v1/traces when running
# with a SQL backend store; the target experiment comes from the
# x-mlflow-experiment-id header (0 = the Default experiment).
# Docs: https://mlflow.org/docs/latest/genai/tracing/opentelemetry/ingest/
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  # Same noise filter as the langfuse collector: tracing is for user-facing
  # LLM activity; health probes, preflights, discovery GETs and management
  # polling are dropped centrally.
  filter/noise:
    error_mode: ignore
    traces:
      span:
        - 'IsMatch(name, ".*\.well-known/agent-card\.json.*")'
        - 'IsMatch(name, ".*/(healthz|readyz)$")'
        - 'IsMatch(name, "^OPTIONS .*")'
        - 'IsMatch(name, "^GET /a2a/.*")'
        - 'IsMatch(name, "^GET /mcp/.*")'
        # The HTTP transport spans around an invocation (gateway + runtime)
        # are plumbing: dropping them makes agentplane.flow the trace's
        # effective root, so tracing UIs show the agent run itself - name,
        # input/output, real latency - instead of "POST /a2a/..." with the
        # lifetime of an SSE connection.
        - 'IsMatch(name, "^POST /a2a/.*")'
        - 'IsMatch(name, "^POST /mcp/.*")'
        - 'IsMatch(name, "^(GET|POST|PUT|PATCH|DELETE) /(api/v1|registry|runtime)/.*")'

exporters:
  otlp_http/mlflow:
    traces_endpoint: http://mlflow:5000/v1/traces
    headers:
      x-mlflow-experiment-id: "0"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/noise, batch]
      exporters: [otlp_http/mlflow]
