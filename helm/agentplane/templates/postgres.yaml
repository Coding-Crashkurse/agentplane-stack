{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentplane.fullname" . }}-postgres-init
  labels: {{- include "agentplane.labels" . | nindent 4 }}
data:
  01-databases.sql: |
    CREATE DATABASE keycloak;
    CREATE DATABASE registry;
    CREATE DATABASE runtime;
    CREATE DATABASE langfuse;
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentplane.fullname" . }}-postgres
  labels: {{- include "agentplane.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: agentplane-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentplane.fullname" . }}-postgres
  labels: {{- include "agentplane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "agentplane.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentplane-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentplane-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: agentplane
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            periodSeconds: 5
          {{- with .Values.resources.postgres }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: init
          configMap:
            name: {{ include "agentplane.fullname" . }}-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
