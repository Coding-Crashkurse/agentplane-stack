apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentplane.fullname" . }}-ui-config
  labels: {{- include "agentplane.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "oidc": {
        "issuer": {{ include "agentplane.issuer" . | quote }},
        "clientId": "agentplane-ui"
      },
      "registryUrl": "{{ include "agentplane.publicBaseUrl" . }}/registry/api/v1",
      "a2aBaseUrl": {{ include "agentplane.publicBaseUrl" . | quote }},
      {{- if .Values.keycloak.enabled }}
      "adminApiUrl": "/kc-admin/admin/realms/{{ .Values.keycloak.realm }}",
      {{- end }}
      "demoAuth": false,
      "links": [
        {{- if .Values.builder.enabled }}
        {
          "id": "builder",
          "name": "Agent Builder",
          "description": "Build and deploy agent flows",
          "icon": "workflow",
          "url": {{ include "agentplane.builderOrigin" . | quote }},
          "roles": ["builder", "admin"]
        }
        {{- end }}
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentplane.fullname" . }}-ui
  labels: {{- include "agentplane.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: agentplane-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentplane.fullname" . }}-ui
  labels: {{- include "agentplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.ui }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentplane-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentplane-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ .Values | toJson | sha256sum | trunc 16 }}
    spec:
      containers:
        - name: ui
          image: {{ .Values.images.ui }}
          {{- if .Values.keycloak.enabled }}
          env:
            # Same-origin proxy target for /admin/users (Caddy forwards
            # /kc-admin/* here, avoiding cross-origin KC admin calls).
            - name: KC_ADMIN_UPSTREAM
              value: http://{{ include "agentplane.fullname" . }}-keycloak:8080
          {{- end }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /srv/config.json
              subPath: config.json
          {{- with .Values.resources.ui }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "agentplane.fullname" . }}-ui-config
